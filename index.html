<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />
  <title>YouTube Player Wrapper</title>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    body {
      position: fixed;
      inset: 0;
    }

    #app {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      background: #000;
      overflow: hidden;
    }

    #player-wrap {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      background: #000;
    }

    #player {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .debug {
      position: absolute;
      left: 10px;
      right: 10px;
      bottom: max(10px, env(safe-area-inset-bottom));
      z-index: 20;
      padding: 8px 10px;
      border-radius: 10px;
      background: rgba(0, 0, 0, 0.55);
      color: #fff;
      font-size: 12px;
      line-height: 1.4;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s ease;
      word-break: break-word;
    }

    .debug.show {
      opacity: 1;
    }

    @media (orientation: portrait) {
      #player-wrap,
      #player {
        width: 100vw;
        height: 100vh;
      }
    }

    @media (orientation: landscape) {
      #player-wrap,
      #player {
        width: 100vw;
        height: 100vh;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="player-wrap">
      <div id="player"></div>
    </div>

    <div id="debug" class="debug"></div>
  </div>

  <script>
    let player = null;
    let playerReady = false;
    let pendingCommand = null;
    let currentVideoId = null;

    const debugEl = document.getElementById("debug");

    function showDebug(message) {
      debugEl.textContent = message;
      debugEl.classList.add("show");

      clearTimeout(showDebug._t);
      showDebug._t = setTimeout(() => {
        debugEl.classList.remove("show");
      }, 2500);
    }

    function getOrigin() {
      return window.location.origin;
    }

    function isValidVideoId(id) {
      return typeof id === "string" && /^[a-zA-Z0-9_-]{11}$/.test(id);
    }

    function extractVideoId(input) {
      const value = (input || "").trim();
      if (!value) return null;

      if (isValidVideoId(value)) return value;

      try {
        const url = new URL(value);

        if (url.hostname.includes("youtu.be")) {
          const id = url.pathname.replace("/", "").trim();
          if (isValidVideoId(id)) return id;
        }

        if (url.hostname.includes("youtube.com")) {
          const v = url.searchParams.get("v");
          if (isValidVideoId(v)) return v;

          const parts = url.pathname.split("/").filter(Boolean);
          const embedIndex = parts.indexOf("embed");
          if (embedIndex !== -1 && parts[embedIndex + 1]) {
            const id = parts[embedIndex + 1];
            if (isValidVideoId(id)) return id;
          }
        }
      } catch (_) {}

      return null;
    }

    function parseBool(value, fallback = false) {
      if (value === true || value === "true" || value === "1" || value === 1) return true;
      if (value === false || value === "false" || value === "0" || value === 0) return false;
      return fallback;
    }

    function parseNumber(value, fallback = 0) {
      const n = Number(value);
      return Number.isFinite(n) ? n : fallback;
    }

    function getUrlConfig() {
      const url = new URL(window.location.href);
      const hash = url.hash.startsWith("#") ? url.hash.slice(1) : url.hash;
      const hashParams = new URLSearchParams(hash);
      const searchParams = url.searchParams;

      const rawVideo =
        searchParams.get("videoId") ||
        searchParams.get("v") ||
        hashParams.get("videoId") ||
        hashParams.get("v");

      return {
        videoId: extractVideoId(rawVideo),
        autoplay: parseBool(
          searchParams.get("autoplay") ?? hashParams.get("autoplay"),
          true
        ),
        startSeconds: parseNumber(
          searchParams.get("start") ?? hashParams.get("start"),
          0
        )
      };
    }

    function ensurePlayerReady(fn) {
      if (playerReady && player) {
        fn();
        return;
      }

      pendingCommand = fn;
      showDebug("Player pas encore prêt");
    }

    function flushPendingCommand() {
      if (pendingCommand) {
        const cmd = pendingCommand;
        pendingCommand = null;
        cmd();
      }
    }

    function loadVideo(videoId, autoplay = false, startSeconds = 0) {
      const id = extractVideoId(videoId);
      if (!id) {
        showDebug("videoId invalide");
        return;
      }

      currentVideoId = id;

      ensurePlayerReady(() => {
        if (autoplay) {
          player.loadVideoById({
            videoId: id,
            startSeconds: Math.max(0, Number(startSeconds) || 0)
          });
        } else {
          player.cueVideoById({
            videoId: id,
            startSeconds: Math.max(0, Number(startSeconds) || 0)
          });
        }

        showDebug(`Vidéo chargée : ${id}`);
      });
    }

    function playVideo() {
      ensurePlayerReady(() => player.playVideo());
    }

    function pauseVideo() {
      ensurePlayerReady(() => player.pauseVideo());
    }

    function stopVideo() {
      ensurePlayerReady(() => player.stopVideo());
    }

    function seekTo(seconds, allowSeekAhead = true) {
      ensurePlayerReady(() => player.seekTo(Math.max(0, Number(seconds) || 0), allowSeekAhead));
    }

    function mute() {
      ensurePlayerReady(() => player.mute());
    }

    function unmute() {
      ensurePlayerReady(() => player.unMute());
    }

    function setVolume(volume) {
      ensurePlayerReady(() => {
        const safeVolume = Math.max(0, Math.min(100, Number(volume) || 0));
        player.setVolume(safeVolume);
      });
    }

    function handleIncomingMessage(data) {
      if (!data || typeof data !== "object") return;

      switch (data.action) {
        case "load":
          loadVideo(
            data.videoId || data.url,
            parseBool(data.autoplay, true),
            parseNumber(data.startSeconds, 0)
          );
          break;

        case "play":
          playVideo();
          break;

        case "pause":
          pauseVideo();
          break;

        case "stop":
          stopVideo();
          break;

        case "seek":
          seekTo(data.seconds, data.allowSeekAhead !== false);
          break;

        case "mute":
          mute();
          break;

        case "unmute":
          unmute();
          break;

        case "setVolume":
          setVolume(data.volume);
          break;

        default:
          showDebug(`Action inconnue : ${data.action}`);
          break;
      }
    }

    window.addEventListener("message", (event) => {
      handleIncomingMessage(event.data);
    });

    window.addEventListener("hashchange", () => {
      const config = getUrlConfig();
      if (config.videoId) {
        loadVideo(config.videoId, config.autoplay, config.startSeconds);
      }
    });

    function notifyHost(type, payload = {}) {
      const message = { type, ...payload };

      try {
        window.parent.postMessage(message, "*");
      } catch (_) {}

      try {
        window.postMessage(message, "*");
      } catch (_) {}
    }

    window.onYouTubeIframeAPIReady = function () {
      const initial = getUrlConfig();

      player = new YT.Player("player", {
        width: "100%",
        height: "100%",
        videoId: initial.videoId || "dQw4w9WgXcQ",
        playerVars: {
          autoplay: initial.autoplay ? 1 : 0,
          controls: 1,
          disablekb: 0,
          fs: 1,
          playsinline: 1,
          rel: 0,
          modestbranding: 1,
          enablejsapi: 1,
          origin: getOrigin(),
          start: Math.max(0, initial.startSeconds || 0)
        },
        events: {
          onReady: () => {
            playerReady = false;
            try {
              const data = player.getVideoData?.();
              if (data?.video_id) currentVideoId = data.video_id;
            } catch (_) {}

            showDebug(`Player prêt : ${getOrigin()}`);
            notifyHost("playerReady", {
              origin: getOrigin(),
              videoId: currentVideoId
            });

            flushPendingCommand();
          },

          onStateChange: (event) => {
            try {
              const data = player.getVideoData?.();
              if (data?.video_id) currentVideoId = data.video_id;
            } catch (_) {}

            notifyHost("playerStateChange", {
              state: event.data,
              videoId: currentVideoId
            });
          },

          onError: (event) => {
            showDebug(`Erreur YouTube : ${event.data}`);
            notifyHost("playerError", {
              error: event.data,
              videoId: currentVideoId
            });
          }
        }
      });
    };

    const tag = document.createElement("script");
    tag.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);
  </script>
</body>
</html>
